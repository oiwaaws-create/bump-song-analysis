<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUMP OF CHICKEN 天体観測録</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="starfield" aria-hidden="true"></div>
<div class="nebula-glow" aria-hidden="true"></div>

<!-- ====================== ヘッダー(タイトル + タブ) ====================== -->
<header class="site-header">
  <div class="header-inner">
    <h1 class="site-title">
      BUMP OF CHICKEN <small>天体観測録 / OBSERVATION LOG</small>
    </h1>
    <nav class="orbit-nav" id="tabNav" aria-label="メインナビゲーション">
      <button class="tab-btn" data-route="home">ホーム</button>
      <button class="tab-btn" data-route="members">メンバー</button>
      <button class="tab-btn" data-route="album">アルバム</button>
      <button class="tab-btn" data-route="live">ライブ定番曲</button>
      <span class="indicator" id="navIndicator"></span>
    </nav>
    <nav class="breadcrumbs" id="breadcrumbs" aria-label="現在の位置"></nav>
  </div>
</header>

<!-- ====================== 本体レイアウト ====================== -->
<div class="layout">

  <div class="main-col">

    <!-- タブごとに切り替わるメインコンテンツ -->
    <section id="view-root" aria-live="polite"></section>

    <!-- ここから下(検索バー + 全曲一覧)は全ページ共通で固定表示 -->
    <section class="catalog-section">
      <span class="section-eyebrow">STAR CATALOG — 全曲一覧</span>
      <h2 class="section-title">曲を検索する</h2>

      <div class="search-wrap">
        <span class="icon">⌖</span>
        <input type="search" id="searchInput" placeholder="曲名・アルバム名で検索…" aria-label="曲を検索">
      </div>
      <p class="search-meta" id="searchMeta"></p>

      <div class="song-grid" id="songGrid"></div>
      <div class="empty-state" id="emptyState" hidden>該当する観測記録が見つかりません。検索語を変えてお試しください。</div>

      <div class="pagination" id="pagination"></div>
    </section>

  </div>

  <!-- ====================== サイドバー: 観測ログ(最近の更新) ====================== -->
  <aside class="log-panel" aria-label="最近のアップロード">
    <h2>観測ログ</h2>
    <span class="log-sub">RECENT UPLOADS — 最新10件</span>
    <ul class="log-list" id="recentList"></ul>
  </aside>

</div>

<footer class="site-footer">
  © BUMP OF CHICKEN 天体観測録 — ファンメイドの非公式サイトです / This is an unofficial fan site.
</footer>

<script src="js/data.js"></script>
<script src="js/app.js"></script>
</body>
</html>
